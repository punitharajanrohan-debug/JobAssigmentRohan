<div class="min-h-screen flex items-center justify-center bg-white px-4">
  <div class="w-full max-w-sm">

    <!-- Heading -->
    <h1 class="text-center text-2xl font-semibold text-gray-500 mb-10">Hi</h1>

    <!-- Email field -->
    <div class="mb-8">
      <div class="flex items-center gap-3 border-b border-gray-300 pb-2 focus-within:border-blue-500 transition-colors">
        <!-- Mail icon -->
        <svg class="w-5 h-5 text-gray-500 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <rect x="3" y="5" width="18" height="14" rx="2" />
          <path d="m3 7 9 6 9-6" />
        </svg>
        <input
          type="email"
          [(ngModel)]="email"
          placeholder="Email*"
          class="w-full text-sm text-gray-700 placeholder-gray-500 bg-transparent outline-none"
        />
      </div>
    </div>

    <!-- Password field -->
    <div class="mb-10">
      <div class="flex items-center gap-3 border-b border-gray-300 pb-2 focus-within:border-blue-500 transition-colors">
        <!-- Key icon -->
        <svg class="w-5 h-5 text-gray-500 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <circle cx="7.5" cy="15.5" r="3.5" />
          <path d="m10 13 8.5-8.5M15 6.5 18 9.5M13 8.5 16 11.5" />
        </svg>
        <input
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="password"
          placeholder="Password*"
          class="w-full text-sm text-gray-700 placeholder-gray-500 bg-transparent outline-none"
        />
        <!-- Eye toggle -->
        <button
          type="button"
          (click)="togglePasswordVisibility()"
          class="text-gray-400 hover:text-gray-600 shrink-0"
          aria-label="Toggle password visibility"
        >
          <!-- Eye-off icon (hidden) -->
          <svg *ngIf="!showPassword" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path d="M3 3l18 18" />
            <path d="M10.6 5.1A9.8 9.8 0 0 1 12 5c7 0 10 7 10 7a17.5 17.5 0 0 1-3.2 4.2M6.6 6.6A17 17 0 0 0 2 12s3 7 10 7a9.7 9.7 0 0 0 5.4-1.6" />
            <path d="M9.9 9.9a3 3 0 0 0 4.2 4.2" />
          </svg>
          <!-- Eye icon (visible) -->
          <svg *ngIf="showPassword" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Login button -->
    <button
  type="button"
  (click)="login()"
  [disabled]="isLoading"
  class="w-full py-2.5 rounded text-white text-sm font-medium tracking-wide
         bg-linear-to-r from-sky-300 via-blue-500 to-indigo-600
         hover:opacity-90 active:scale-[0.99] transition
         disabled:opacity-60 disabled:cursor-not-allowed"
>
  {{ isLoading ? 'LOGGING IN...' : 'LOGIN' }}
</button>

  </div>
</div>
